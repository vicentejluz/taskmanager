# Postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/${PG_DB}
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desativar no perfil prod
spring.config.import=optional:file:.env[.properties]

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/

admin.password=${ADMIN_PASSWORD}

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
# Desativa a detecção automática de repositories do Spring Data Redis.
# Útil quando o Redis é utilizado apenas como cache ou para operações
# manuais (ex: blacklist de JWT) usando RedisTemplate, evitando
# varredura desnecessária de repositories e logs no startup.
spring.data.redis.repositories.enabled=false