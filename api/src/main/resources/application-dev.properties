# Postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/${PG_DB}
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desativar no perfil prod
spring.config.import=optional:file:.env[.properties]

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/

admin.password=${ADMIN_PASSWORD}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

file.upload.max-size=20MB
file.upload.max-total-size=100MB
file.upload.max-files-per-task=5

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.password=${REDIS_PASSWORD}
# Desativa a deteccao automatica de repositories do Spring Data Redis.
# Util quando o Redis e utilizado apenas como cache ou para operacoes
# manuais (ex: blacklist de JWT) usando RedisTemplate, evitando
# varredura desnecessaria de repositories e logs na startup.
spring.data.redis.repositories.enabled=false

redis.ca=./redis/certs/ca.crt

app.storage.type=s3

# MinIO/S3
app.storage.s3.url=http://localhost:9000
app.storage.s3.bucket-name=taskmanager-files
app.storage.s3.region=sa-east-1
app.storage.s3.access-key=${S3_ACCESS_KEY}
app.storage.s3.secret-key=${S3_SECRET_KEY}

# Azurite-blob/Azure-blob
app.storage.azure-blob.endpoint=http://localhost:10000/${AZURITE_ACCOUNT}
app.storage.azure-blob.account-name=${AZURITE_ACCOUNT}
app.storage.azure-blob.account-key=${AZURITE_KEY}
app.storage.azure-blob.container-name=taskmanager-files
app.storage.azure-blob.connection-string=AccountName=${AZURITE_ACCOUNT};AccountKey=${AZURITE_KEY};DefaultEndpointsProtocol=http;BlobEndpoint=http://localhost:10000/${AZURITE_ACCOUNT};