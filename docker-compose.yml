services:
  db:
    image: postgres:18.3-alpine3.23
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    mem_limit: 512m # Limits the container to use a maximum of 512MB RAM
    cpus: 0.5 # Limits CPU usage to 25% of a single CPU core
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"] # Command used by Docker to check if the container is healthy
      interval: 15s # Time between each health check execution
      timeout: 5s # Maximum time Docker waits for the health check command to respond
      retries: 5 # Number of consecutive failures before marking the container as unhealthy
      start_period: 10s # Initial delay before starting health checks (allows the service to boot)

  db-redis:
    image: redis:8.6.1-alpine3.23
    container_name: redis
    restart: unless-stopped
    # Configuração do Redis
    # --requirepass ${REDIS_PASSWORD} - Exige senha para conectar ao Redis
    # --tls-port 6380 - Porta TLS/SSL: 6380, (criptografada) para conexões seguras
    # --port 0 - Desativa a porta padrão não segura
    # --tls-cert-file /certs/redis.crt - Arquivo do certificado do servidor Redis
    # --tls-key-file /certs/redis.key - Arquivo da chave privada correspondente ao certificado
    # --tls-ca-cert-file /certs/ca.crt - Arquivo do certificado da autoridade certificadora (CA)
    # -–tls-auth-clients no - NAO exige cert do cliente
    # --maxmemory 256mb - Limite de memória: 256MB
    # --maxmemory-policy allkeys-lru - Política de evicção: remove as chaves menos recentemente usadas quando atinge o limite
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD} 
      --tls-port 6380 
      --port 0 
      --tls-cert-file /certs/redis.crt 
      --tls-key-file /certs/redis.key
      --tls-ca-cert-file /certs/ca.crt
      --tls-auth-clients no
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6380"
    volumes:
      - ./redis/certs:/certs:ro # :ro in Docker means the volume is mounted read-only inside the container.
    mem_limit: 312m # Limits the container to use a maximum of 312MB RAM
    cpus: 0.2 # Limits CPU usage to 20% of a single CPU core
    healthcheck:
      # test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"] # Command used by Docker to check if the container is healthy
      test: ["CMD",
        "redis-cli", 
        "-h", "127.0.0.1", 
        "-p", "6380", 
        "--tls", 
        "--cacert", "/certs/ca.crt", 
        "--cert", "/certs/redis.crt",
        "--key", "/certs/redis.key",
        "-a", "${REDIS_PASSWORD}", 
        "ping"
      ] # Command used by Docker to check if the container is healthy
      interval: 15s # Time between each health check execution
      timeout: 5s # Maximum time Docker waits for the health check command to respond
      retries: 5 # Number of consecutive failures before marking the container as unhealthy
      start_period: 10s # Initial delay before starting health checks (allows the service to boot)

  elasticsearch:
      image: elasticsearch:9.3.1
      container_name: elasticsearch
      restart: on-failure
      environment:
        discovery.type: single-node
        xpack.security.enabled: false # Disable security for local development
        bootstrap.memory_lock: true # Prevents Elasticsearch memory from being swapped to disk
        ES_JAVA_OPTS: -Xms512m -Xmx512m
      ports:
        - "9200:9200"
      volumes:
        - es_data:/usr/share/elasticsearch/data
      networks:
        - elk-network
      mem_limit: 768m # Limits the container to use a maximum of 1G RAM
      cpus: 1 # Limits CPU usage to 100% of a single CPU core
      ulimits:
        memlock:
          soft: -1 # Soft limit: allows the process to lock unlimited memory
          hard: -1 # Hard limit: maximum allowed locked memory
      healthcheck:
        test: [ "CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null || exit 1" ] # Command used by Docker to check if the container is healthy
        interval: 30s # Time between each health check execution
        timeout: 10s # Maximum time Docker waits for the health check command to respond
        retries: 5 # Number of consecutive failures before marking the container as unhealthy
        start_period: 5s # Initial delay before starting health checks (allows the service to boot)

  logstash:
      image: logstash:9.3.1
      container_name: logstash
      restart: on-failure
      platform: linux/amd64
      depends_on:
        elasticsearch:
          condition: service_healthy # Ensures this service starts only after the dependency is healthy
      environment:
        LS_JAVA_OPTS: -Xms256m -Xmx256m
      ports:
        - "5044:5044"
      volumes:
        - ./logstash/pipeline:/usr/share/logstash/pipeline
      networks:
        - elk-network
      mem_limit: 512m # Limits the container to use a maximum of 512MB RAM
      cpus: 0.5 # Limits CPU usage to 50% of a single CPU core

  kibana:
    image: kibana:9.3.1
    container_name: kibana
    restart: on-failure
    depends_on:
      elasticsearch:
        condition: service_healthy # Ensures this service starts only after the dependency is healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - elk-network
    mem_limit: 512m # Limits the container to use a maximum of 512MB RAM
    cpus: 0.5 # Limits CPU usage to 50% of a single CPU core

  mailpit:
    image: axllent/mailpit:v1.29.3
    container_name: mailpit
    restart: on-failure
    environment:
      MP_SMTP_AUTH: ${MAILPIT_USER}:${MAILPIT_PASSWORD}        # 👤 SMTP login credentials
      MP_UI_AUTH: ${MAILPIT_USER}:${MAILPIT_PASSWORD}          # 🔑 Web UI login credentials
#      MAIL_FROM_ADDRESS: taskmanager@mailpit.com
      MP_SMTP_TLS_CERT: /certs/mailpit.crt
      MP_SMTP_TLS_KEY: /certs/mailpit.key
      MP_DATABASE: /data
      MP_MAX_MESSAGES: 3000                # 💌 Max number of stored messages
      MP_VERBOSE: true                      # 🪵 Enable verbose logging
    ports:
      - "8025:8025" # 🌐 Web GUI
      - "1025:1025" # 📮 SMTP
    volumes:
      - mailpit-data:/data  # 💾 Persistent storage for messages
      - ./mailpit/certs:/certs:ro # :ro in Docker means the volume is mounted read-only inside the container.
    mem_limit: 128m # Limits the container to use a maximum of 128MB RAM
    cpus: 0.25 # Limits CPU usage to 25% of a single CPU core
    healthcheck:
      test: [ "CMD", "/mailpit", "readyz" ] # Command used by Docker to check if the container is healthy
      interval: 15s # Time between each health check execution
      timeout: 5s # Maximum time Docker waits for the health check command to respond
      retries: 3 # Number of consecutive failures before marking the container as unhealthy
      start_period: 10s # Initial delay before starting health checks (allows the service to boot)

  minio:
    image: pgsty/minio:latest
    container_name: minio
    restart: on-failure
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console Web
    volumes:
      - minio-data:/data
    mem_limit: 512m # Limits the container to use a maximum of 512MB RAM
    cpus: 0.5 # Limits CPU usage to 50% of a single CPU core
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000 || exit 1"] # Command used by Docker to check if the container is healthy
      interval: 15s # Time between each health check execution
      timeout: 5s # Maximum time Docker waits for the health check command to respond
      retries: 3 # Number of consecutive failures before marking the container as unhealthy
      start_period: 10s # Initial delay before starting health checks (allows the service to boot)

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    restart: on-failure
    command: azurite --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck
    environment:
      AZURITE_ACCOUNTS: ${AZURITE_ACCOUNT}:${AZURITE_KEY}
    ports:
      - "10000:10000" # Blob service
    volumes:
      - azurite-data:/data
    mem_limit: 512m # Limits the container to use a maximum of 512MB RAM
    cpus: 0.5 # Limits CPU usage to 50% of a single CPU core
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://127.0.0.1:10000 >/dev/null 2>&1; [ $? -ne 4 ]" ] # Command used by Docker to check if the container is healthy
      interval: 15s # Time between each health check execution
      timeout: 5s # Maximum time Docker waits for the health check command to respond
      retries: 3 # Number of consecutive failures before marking the container as unhealthy
      start_period: 10s # Initial delay before starting health checks (allows the service to boot)

  storage-local:
      image: alpine:3.23.3
      container_name: storage-local
      restart: unless-stopped
      command: ["sh", "-c", "mkdir -p /data && tail -f /dev/null"] # create /data directory and keep container running idle (no service, only volume holder)
      volumes:
        - ./local-storage:/data
      mem_limit: 32m # Limits the container to use a maximum of 32MB RAM
      cpus: 0.05 # Limits CPU usage to 5% of a single CPU core

volumes:
  pg-data:
  es_data:
  mailpit-data:
  minio-data:
  azurite-data:

networks:
  elk-network:


